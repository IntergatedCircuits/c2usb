# This is the shared manifest file for west module use, regardless of SDK
manifest:
  self:
    path: c2usb
    west-commands: scripts/west-commands.yml
  defaults:
    remote: IntergatedCircuits

  remotes:
    - name: IntergatedCircuits
      url-base: https://github.com/IntergatedCircuits

  projects:
    - name: zephyrrtos-mcpp
      revision: 167d407866db5024886a5acb9252a8d5d7ec0977
      path: modules/lib/zephyrrtos-mcpp

    - name: hid-rp
      revision: be90bc4cee05b2a329c0024157b7668e31eb00d4
      import:
        path-prefix: modules/lib

    - name: etl
      url: https://github.com/ETLCPP/etl
      revision: 20.46.2
      clone-depth: 1
      path: modules/lib/etl
